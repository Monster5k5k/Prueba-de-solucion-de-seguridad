apiVersion: apps/v1
kind: Deployment
metadata:
  name: nestapi-deployment
  namespace: linas-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nestapi
  template:
    metadata:
      labels:
        app: nestapi
    spec:
      containers:
        - name: nestapi
          image: mortviva7/ubnest:latest
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: "postgre-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgre-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgre-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgre-secret
                  key: POSTGRES_PASSWORD
            - name: PORT
              value: "3001"
