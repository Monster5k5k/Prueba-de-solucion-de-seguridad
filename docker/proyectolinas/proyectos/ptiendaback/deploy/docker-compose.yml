version: '3.8'

services:
  ctl_tiendaback:
    container_name: ctl_tiendaback
    build:
      context: ${CONTEXTO}
      dockerfile: ./dockerfiles/10_tienda_back/Dockerfile
    image: mortviva7/ubtiendaback:latest
    ports:
      - "${PORT_BACK}:3007"
      - "${PORT_SSH}:22"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=3007
    env_file:
      - .env
    volumes:
      - ./logs:/root/logs
    networks:
      - red_proyectolinas

networks:
  red_proyectolinas:
    external: true
