version: '3.8'

services:
  ctl_nest:
    container_name: ctl_nest
    build:
      context: ${CONTEXTO}
      dockerfile: ./dockerfiles/07_nest/Dockerfile
    image: mortviva7/ubnest:latest
    ports:
      - "${PORT_NEST_HOST}:${PORT_NEST}"
      - "${PORT_SSH}:22"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - PORT=${PORT_NEST}
    env_file:
      - .env
    networks:
      - red_proyectolinas
    volumes:
      - ${CONTEXTO}/proyectos/api-nest:/app/api

networks:
  red_proyectolinas:
    external: true
