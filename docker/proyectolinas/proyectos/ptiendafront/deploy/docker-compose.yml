version: '3.8'

services:
  ctl_tiendafront:
    container_name: ctl_tiendafront
    build:
      context: ${CONTEXTO}
      dockerfile: ./dockerfiles/11_tienda_front/Dockerfile
    image: mortviva7/ubtiendafront:latest
    ports:
      - "${PORT_FRONT}:3008"
      - "${PORT_SSH}:22"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    volumes:
      - ./logs:/root/logs
    networks:
      - red_proyectolinas

networks:
  red_proyectolinas:
    external: true
